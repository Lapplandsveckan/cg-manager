name: Release Application
on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  publish:
    name: Build & Release app
    runs-on: ubuntu-latest
    steps:
      - name: Clone codebase
        uses: actions/checkout@v4

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'yarn'

      - name: Get tag name
        id: tag
        run: echo "name=$(node ./packages/server/.lappis/scripts/get-release-name.js ${{ github.run_number }})" >> $GITHUB_OUTPUT

      - name: Install project dependencies
        run: yarn install --prefer-offline

      - name: Package application
        run: yarn package

      - name: Release asset
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          draft: false
          prerelease: false
          files: |
            ./packages/server/out/manager